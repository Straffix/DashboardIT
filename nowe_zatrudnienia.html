<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nowe zatrudnienia - Zarządzanie</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/bc955bc9a2.js" crossorigin="anonymous"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <a href="index.html"
                style="text-decoration:none; color:inherit; font-size: 1.2rem; margin-bottom: 10px; display: inline-block;">
                <i class="fas fa-arrow-left"></i> Powrót do menu
            </a>
            <div class="logo-section">
                <div class="icon-box"><i class="fas fa-shield-alt"></i></div>
                <div>
                    <h1>Nowe Zatrudnienia</h1>
                    <p>Projekt i wykonanie: <span>Arkadiusz Lisiecki</span></p>
                </div>
            </div>
        </header>

        <div class="main-content">
            <section>
                <div class="table-header">
                    <button onclick="changeMonth(-1)" class="month-nav-btn"><i class="fas fa-chevron-left"></i></button>

                    <div class="month-picker-container" style="position: relative; cursor: pointer;"
                        onclick="document.getElementById('hidden-month-input').showPicker()">
                        <h2 id="current-month-display">STYCZEŃ 2024</h2>
                        <input type="month" id="hidden-month-input"
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
                    </div>

                    <button onclick="changeMonth(1)" class="month-nav-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>IMIĘ I NAZWISKO</th>
                            <th>STANOWISKO</th>
                            <th>SPRZĘT (SN)</th>
                            <th>DATA STARTU</th>
                            <th style="text-align:center">STATUS IT</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </section>
            <aside>
                <h2>Dodaj pracownika</h2>
                <form id="device-form">
                    <div class="input-group">
                        <label>Imię i Nazwisko</label>
                        <input type="text" id="name" required placeholder="np. Jan Kowalski">
                    </div>

                    <div class="input-group">
                        <label>Dział / Stanowisko</label>
                        <input type="text" id="ru" required placeholder="np. Administracja">
                    </div>

                    <div class="input-group">
                        <label>SN Laptopa</label>
                        <input type="text" id="sn" required placeholder="np. PF928402">
                    </div>

                    <div class="input-group">
                        <label>Akcesoria do wydania</label>
                        <div class="accessory-picker" id="accessory-picker">
                            <div class="accessory-item" data-item="mouse" title="Myszka">
                                <i class="fas fa-mouse"></i>
                            </div>
                            <div class="accessory-item" data-item="keyboard" title="Klawiatura">
                                <i class="fas fa-keyboard"></i>
                            </div>
                            <div class="accessory-item" data-item="headset" title="Słuchawki">
                                <i class="fas fa-headset"></i>
                            </div>
                            <div class="accessory-item" data-item="monitor" title="Monitor">
                                <i class="fas fa-desktop"></i>
                            </div>
                            <div class="accessory-item" data-item="bag" title="Torba">
                                <i class="fas fa-briefcase"></i>
                            </div>
                        </div>
                    </div>

                    <div class="input-group" id="date-group">
                        <label>Data rozpoczęcia pracy</label>
                        <input type="date" id="date" required>
                    </div>

                    <button type="submit" class="btn-submit" style="background: #6366f1;">Dodaj do listy</button>
                </form>


                <section class="backup_section">
                    <h3>Kopia zapasowa</h3>
                    <div class="backup-container">

                        <div class="backup-row">
                            <button onclick="exportJSON()" class="btn-backup-item">
                                <i class="fa-solid fa-file-export"></i> Eksport JSON
                            </button>

                            <input type="file" id="importFile" accept=".json" style="display:none"
                                onchange="importJSON(event)">

                            <button onclick="document.getElementById('importFile').click()" class="btn-backup-item">
                                <i class="fa-solid fa-file-import"></i> Import JSON
                            </button>
                        </div>

                        <div class="backup-row">
                            <button onclick="exportExcel()" class="btn-backup-item btn-excel-green">
                                <i class="fa-solid fa-file-excel"></i> Eksport EXCEL
                            </button>

                            <input type="file" id="importExcelFile" accept=".xlsx, .xls" style="display:none"
                                onchange="importExcel(event)">

                            <button onclick="document.getElementById('importExcelFile').click()"
                                class="btn-backup-item">
                                <i class="fa-solid fa-file-import"></i> Import EXCEL
                            </button>
                        </div>

                    </div>
                </section>
            </aside>
        </div>
    </div>
    <script src="./js/script_zatrudnienia.js"></script>
</body>

</html>
