<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wymiana Sprzętu - IT Support</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="wrapper">

        <header class="header">

            <a href="index.html"
                style="text-decoration:none; color:inherit; font-size:1.2rem; margin-bottom:10px; display:inline-block;">
                <i class="fa-solid fa-chevron-left"></i> Powrót do Dashboardu
            </a>

            <div class="logo-section">

                <div class="icon-box">
                    <i class="fa-solid fa-right-left"></i>
                </div>

                <div>
                    <h1>Wymiana Sprzętu</h1>
                    <p>Zarządzanie cyklem życia urządzeń <span>(3 lata)</span></p>
                </div>

            </div>

        </header>

        <main class="main-content">

            <section>

                <div class="table-header">

                    <button onclick="changeMonth(-1)" class="month-nav-btn">
                        <i class="fas fa-chevron-left"></i>
                    </button>

                    <div class="month-picker-container" style="position:relative; cursor:pointer;"
                        onclick="document.getElementById('hidden-month-input').showPicker()">

                        <h2 id="current-month-display">STYCZEŃ 2024</h2>

                        <input type="month" id="hidden-month-input"
                            style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;">

                    </div>

                    <button onclick="changeMonth(1)" class="month-nav-btn">
                        <i class="fas fa-chevron-right"></i>
                    </button>

                </div>

                <div class="table-container">

                    <table>

                        <thead>
                            <tr>
                                <th>Pracownik</th>
                                <th>Data Wymiany</th>
                                <th>Zwrot (Stary)</th>
                                <th>Wydanie (Nowy)</th>
                                <th style="text-align:center">Akcesoria</th>
                                <th>Akcja</th>
                            </tr>
                        </thead>

                        <tbody id="table-body"></tbody>

                    </table>

                </div>

            </section>

            <aside>

                <h2>Zaplanuj nową wymianę</h2>

                <form id="exchange-form">

                    <div class="input-group">
                        <label><i class="fa-solid fa-user"></i> Pracownik</label>
                        <input type="text" id="emp-name" required placeholder="Imię i Nazwisko">
                    </div>

                    <div class="input-group">
                        <label><i class="fa-solid fa-calendar-day"></i> Data planowanej wymiany</label>
                        <input type="date" id="exchange-date" required>
                    </div>

                    <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">

                        <div class="input-group">
                            <label style="color:#ef4444;">Stary Laptop (SN)</label>
                            <input type="text" id="old-sn" placeholder="SN do zwrotu">
                        </div>

                        <div class="input-group">
                            <label style="color:#22c55e;">Nowy Laptop (SN)</label>
                            <input type="text" id="new-sn" placeholder="SN do wydania">
                        </div>

                    </div>

                    <div class="input-group">

                        <label>Dodatkowe wydania przy wymianie</label>

                        <div class="accessory-picker" id="accessory-picker">

                            <div class="accessory-item" data-item="mouse" title="Myszka">
                                <i class="fas fa-mouse"></i>
                            </div>

                            <div class="accessory-item" data-item="keyboard" title="Klawiatura">
                                <i class="fas fa-keyboard"></i>
                            </div>

                            <div class="accessory-item" data-item="headset" title="Słuchawki">
                                <i class="fas fa-headset"></i>
                            </div>

                            <div class="accessory-item" data-item="monitor" title="Nowy Monitor">
                                <i class="fas fa-desktop"></i>
                            </div>

                            <div class="accessory-item" data-item="bag" title="Torba / Etui">
                                <i class="fas fa-briefcase"></i>
                            </div>

                        </div>

                    </div>

                    <div class="input-group">
                        <label>Uwagi (np. uszkodzenia starego)</label>
                        <input type="text" id="notes" placeholder="Opcjonalne notatki...">
                    </div>

                    <button type="submit" class="btn-submit" style="background:#f59e0b; margin-top:20px;">

                        <i class="fa-solid fa-calendar-check"></i>
                        Zatwierdź i zaplanuj

                    </button>

                </form>

            </aside>

        </main>

        <div class="backup_section">

            <h3>Zarządzanie bazą wymian</h3>

            <div class="backup-btns">

                <button onclick="exportJSON()">
                    <i class="fas fa-download"></i>
                    Eksportuj listę (JSON)
                </button>

                <button onclick="document.getElementById('import-file').click()">
                    <i class="fas fa-upload"></i>
                    Importuj listę (JSON)
                </button>

                <input type="file" id="import-file" style="display:none" accept=".json" onchange="importJSON(event)">

            </div>

        </div>

        <footer class="main-footer">
            <p>&copy; <span id="current-year"></span> IT Support Dashboard</p>
        </footer>

    </div>

    <script src="./js/script_wymiana.js" defer></script>

</body>

</html>
